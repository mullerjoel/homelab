x-common: &common
  restart: unless-stopped
  environment: &common-env
    PUID: 1000
    PGID: 1000
    TZ: Europe/Zurich

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
    volumes:
      - ${CONFIG}/plex/config:/config
      - ${CONFIG}/plex/transcode:/transcode
      - /mnt/hdd01/movies:/movies:ro
      - /mnt/hdd01/private:/private:ro
      - /mnt/hdd01/tv:/tv:ro
      - /mnt/hdd01/sport:/sport:ro
    restart: always

  gluetun:
    <<: *common
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      <<: *common-env
      VPN_SERVICE_PROVIDER: nordvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: ${VPN_USER}
      OPENVPN_PASSWORD: ${VPN_PASS}
      SERVER_COUNTRIES: Netherlands
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://ipinfo.io"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qbittorrent:
    <<: *common
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    network_mode: service:gluetun
    environment:
      <<: *common-env
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - ${CONFIG}/qbittorrent:/config
      - ${DATA_DIR}/data:/data
    depends_on:
      gluetun:
        condition: service_healthy

  sonarr:
    <<: *common
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - 8989:8989
    volumes:
      - ${CONFIG}/sonarr:/config
      - ${DATA_DIR}/data:/data

  radarr:
    <<: *common
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - 7878:7878
    volumes:
      - ${CONFIG}/radarr:/config
      - ${DATA_DIR}/data:/data

  prowlarr:
    <<: *common
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - 9696:9696
    volumes:
      - ${CONFIG}/prowlarr:/config

  bazarr:
    <<: *common
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - 6767:6767
    volumes:
      - ${CONFIG}/bazarr:/config
      - ${DATA_DIR}/data:/data

  jellyfin:
    <<: *common
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${CONFIG}/jellyfin:/config
      - ${DATA_DIR}/data/media:/data/media

  seerr:
    <<: *common
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    ports:
      - 5055:5055
    volumes:
      - ${CONFIG}/seerr:/app/config

  flaresolverr:
    <<: *common
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - 8191:8191
    environment:
      <<: *common-env
      LOG_LEVEL: info

  recyclarr:
    <<: *common
    container_name: recyclarr
    image: ghcr.io/recyclarr/recyclarr:latest
    user: 1000:1000
    volumes:
      - ${CONFIG}/recyclarr:/config

networks:
  default:
    name: arr_network
